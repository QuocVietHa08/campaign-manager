version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: campaign_user
      POSTGRES_PASSWORD: campaign_pass
      POSTGRES_DB: campaign_manager
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U campaign_user -d campaign_manager']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgres://campaign_user:campaign_pass@postgres:5432/campaign_manager
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 24h
      PORT: 3001
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/backend/src:/app/packages/backend/src

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  pgdata:
